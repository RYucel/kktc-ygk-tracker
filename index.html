<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KKTC Yasa Gücünde Kararnameler 90 Gün Tracker</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    body { font-family: system-ui, -apple-system, sans-serif; }
    tr:hover { background-color: #f8fafc; }
  </style>
</head>
<body class="bg-gray-50">
  <div class="max-w-7xl mx-auto p-6">
    <div class="flex justify-between items-center mb-8">
      <div>
        <h1 class="text-4xl font-bold text-blue-700 flex items-center gap-3">
          🇹🇷 KKTC Yasa Gücünde Kararnameler
          <span class="text-2xl">90 Gün Tracker</span>
        </h1>
        <p class="text-gray-600 mt-2">
          Kaynak: <a href="https://basimevi.gov.ct.tr/" target="_blank" class="underline">basimevi.gov.ct.tr</a> 
          • Anayasa Mahkemesi kararıyla 90 günde Meclis’te görüşülmezse <strong>hükümsüz</strong>
        </p>
      </div>
      <button onclick="loadData()" 
              class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-3 rounded-2xl flex items-center gap-2 font-medium">
        <i class="fas fa-sync"></i> Yenile
      </button>
    </div>

    <div id="summary" class="grid grid-cols-2 md:grid-cols-3 gap-4 mb-8"></div>

    <div id="loading" class="text-center py-12 text-gray-500">Veriler çekiliyor...</div>
    <div id="tableContainer" class="hidden">
      <table class="w-full bg-white shadow-2xl rounded-3xl overflow-hidden text-sm">
        <thead class="bg-blue-700 text-white">
          <tr>
            <th class="px-6 py-5 text-left">Gazete No</th>
            <th class="px-6 py-5 text-left">Yayın Tarihi</th>
            <th class="px-6 py-5 text-left">Kararname Başlığı</th>
            <th class="px-6 py-5 text-center">Geçen Gün</th>
            <th class="px-6 py-5 text-center">Kalan Gün</th>
            <th class="px-6 py-5 text-center">Durum</th>
            <th class="px-6 py-5 text-center">PDF</th>
          </tr>
        </thead>
        <tbody id="tbody" class="divide-y"></tbody>
      </table>
    </div>

    <p id="footer" class="text-center text-xs text-gray-500 mt-10"></p>
    <div id="debugInfo" class="text-xs text-gray-400 mt-2 text-center"></div>
  </div>

  <script>
    const PROXIES = [
      "https://api.codetabs.com/v1/proxy?quest=",
      "https://corsproxy.io/?",
      "https://api.allorigins.win/raw?url="
    ];
    const TARGET_URL = "https://basimevi.gov.ct.tr/";

    async function tryProxy(proxy) {
      const res = await fetch(proxy + encodeURIComponent(TARGET_URL), {
        headers: { 'User-Agent': 'Mozilla/5.0 (compatible; KKTC-YGK-Tracker/1.0)' },
        signal: AbortSignal.timeout(15000)
      });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      return await res.text();
    }

    async function loadData() {
      const loading = document.getElementById('loading');
      const container = document.getElementById('tableContainer');
      const tbody = document.getElementById('tbody');
      const summary = document.getElementById('summary');
      const debugInfo = document.getElementById('debugInfo');

      tbody.innerHTML = '';
      loading.classList.remove('hidden');
      container.classList.add('hidden');
      debugInfo.textContent = 'Proxy deneniyor...';

      let html = null;
      let usedProxy = null;

      for (const proxy of PROXIES) {
        try {
          html = await tryProxy(proxy);
          usedProxy = proxy;
          break;
        } catch (e) {
          debugInfo.textContent = `Proxy deneniyor... (${PROXIES.indexOf(proxy)+1}/${PROXIES.length})`;
        }
      }

      if (!html) {
        loading.innerHTML = `<span class="text-red-600">Tüm proxy'ler başarısız.</span><button onclick="loadData()" class="mt-4 bg-red-600 text-white px-6 py-2 rounded-xl">Tekrar Dene</button>`;
        return;
      }

      try {
        const parser = new DOMParser();
        const doc = parser.parseFromString(html, 'text/html');
        const table = doc.querySelector('table');
        if (!table) throw new Error('Tablo bulunamadı');

        const rows = table.querySelectorAll('tr');
        const data = [];
        const today = new Date();
        let lastValidDate = null;   // ← NA N SORUNUNU ÇÖZEN KISIM

        for (let row of rows) {
          const tds = row.querySelectorAll('td');
          if (tds.length < 3) continue;

          const sayiCell = tds[0];
          let dateStr = tds[1].textContent.trim();
          const content = tds[2].textContent.trim().toUpperCase();

          if (!content.includes('YASA GÜCÜNDE KARARNAME')) continue;

          // Tarih parsing + fallback (en önemli iyileştirme)
          let pubDate = null;
          const dateRegex = /^\d{2}\.\d{2}\.\d{4}$/;
          
          if (dateStr && dateRegex.test(dateStr)) {
            const [d, m, y] = dateStr.split('.').map(Number);
            pubDate = new Date(y, m - 1, d);
            if (!isNaN(pubDate.getTime())) lastValidDate = pubDate;
          } else if (lastValidDate) {
            pubDate = lastValidDate;   // boş tarih → önceki tarihi kullan
          } else {
            continue; // ilk satırda tarih yoksa atla
          }

          const daysPassed = Math.floor((today - pubDate) / 86400000);
          const daysLeft = 90 - daysPassed;

          const link = sayiCell.querySelector('a');
          const pdf = link ? 'https://basimevi.gov.ct.tr' + link.getAttribute('href') : '#';

          const title = tds[2].textContent.trim().substring(0, 230) + 
                       (tds[2].textContent.trim().length > 230 ? '...' : '');

          data.push({
            sayi: sayiCell.textContent.trim(),
            date: dateStr || pubDate.toLocaleDateString('tr-TR').replace(/\//g, '.'), // gösterimde tarih her zaman olsun
            title: title,
            passed: daysPassed,
            left: daysLeft,
            status: daysLeft > 0 ? '✅ AKTİF' : '❌ SÜRESİ DOLDU',
            pdf: pdf
          });
        }

        data.sort((a, b) => new Date(b.date.split('.').reverse().join('-')) - new Date(a.date.split('.').reverse().join('-')));

        // Tablo doldurma (aynı)
        data.forEach(item => {
          const tr = document.createElement('tr');
          tr.innerHTML = `
            <td class="px-6 py-4 font-medium">${item.sayi}</td>
            <td class="px-6 py-4">${item.date}</td>
            <td class="px-6 py-4 text-gray-700">${item.title}</td>
            <td class="px-6 py-4 text-center font-mono">${item.passed}</td>
            <td class="px-6 py-4 text-center font-bold ${item.left > 0 ? 'text-green-600' : 'text-red-600'}">${item.left}</td>
            <td class="px-6 py-4 text-center">
              <span class="inline-block px-5 py-1 rounded-full text-xs font-semibold ${item.left > 0 ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'}">${item.status}</span>
            </td>
            <td class="px-6 py-4 text-center">
              <a href="${item.pdf}" target="_blank" class="text-blue-600 hover:text-blue-800 font-medium flex items-center justify-center gap-1">
                <i class="fas fa-download"></i> İndir
              </a>
            </td>
          `;
          tbody.appendChild(tr);
        });

        const active = data.filter(d => d.left > 0).length;
        summary.innerHTML = `
          <div class="bg-white rounded-3xl shadow p-6 text-center">
            <div class="text-green-600 text-5xl font-bold">${active}</div>
            <div class="text-gray-600 font-medium mt-1">AKTİF Kararname</div>
          </div>
          <div class="bg-white rounded-3xl shadow p-6 text-center">
            <div class="text-red-600 text-5xl font-bold">${data.length - active}</div>
            <div class="text-gray-600 font-medium mt-1">Süresi Dolmuş</div>
          </div>
          <div class="bg-white rounded-3xl shadow p-6 text-center">
            <div class="text-blue-700 text-5xl font-bold">${data.length}</div>
            <div class="text-gray-600 font-medium mt-1">Toplam YGK</div>
          </div>
        `;

        loading.classList.add('hidden');
        container.classList.remove('hidden');
        document.getElementById('footer').innerHTML = 
          `Son güncelleme: ${new Date().toLocaleString('tr-TR')} • Proxy: ${usedProxy.split('/')[2]}`;

        debugInfo.textContent = `✅ ${data.length} YGK yüklendi (tarih fallback sistemi aktif)`;

      } catch (err) {
        console.error(err);
        loading.innerHTML = `<span class="text-red-600">Parse hatası: ${err.message}</span>`;
      }
    }

    window.onload = loadData;
  </script>
</body>
</html>
